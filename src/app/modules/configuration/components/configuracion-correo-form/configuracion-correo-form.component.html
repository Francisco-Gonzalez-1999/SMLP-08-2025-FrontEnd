<form (ngSubmit)="guardar()" class="config-form">
  <div class="formgrid grid">
    <div class="field col-12">
      <label for="tipoConfiguracion">Tipo de Configuración <span class="text-red-500">*</span></label>
      <input
        id="tipoConfiguracion"
        type="text"
        pInputText
        [(ngModel)]="formData.tipoConfiguracion"
        name="tipoConfiguracion"
        required
        [disabled]="loading"
        placeholder="Ej: Alertas, Notificaciones" />
    </div>

    <div class="field col-12">
      <label for="nombre">Nombre</label>
      <input
        id="nombre"
        type="text"
        pInputText
        [(ngModel)]="formData.nombre"
        name="nombre"
        [disabled]="loading"
        placeholder="Nombre del destinatario (opcional)" />
    </div>

    <div class="field col-12">
      <label for="email">Email <span class="text-red-500">*</span></label>
      <input
        id="email"
        type="email"
        pInputText
        [(ngModel)]="formData.email"
        name="email"
        required
        [disabled]="loading"
        placeholder="correo@ejemplo.com" />
    </div>

    <div class="field col-12" *ngIf="isEditMode">
      <label for="estaActivo">Estado</label>
      <div class="flex align-items-center gap-2">
        <p-inputSwitch
          [(ngModel)]="formData.estaActivo"
          name="estaActivo"
          [disabled]="loading"></p-inputSwitch>
        <span>{{ formData.estaActivo ? 'Activo' : 'Inactivo' }}</span>
      </div>
    </div>
  </div>

  <div class="flex justify-content-end gap-2 mt-4">
    <button
      pButton
      pRipple
      type="button"
      label="Cancelar"
      icon="pi pi-times"
      class="p-button-text"
      (click)="cancelar()"
      [disabled]="loading"></button>
    <button
      pButton
      pRipple
      type="submit"
      [label]="isEditMode ? 'Actualizar' : 'Crear'"
      [icon]="isEditMode ? 'pi pi-check' : 'pi pi-plus'"
      [class]="isEditMode ? 'p-button-warning' : 'p-button-success'"
      [disabled]="loading"
      [loading]="loading"></button>
  </div>
</form>

<p-toast></p-toast>

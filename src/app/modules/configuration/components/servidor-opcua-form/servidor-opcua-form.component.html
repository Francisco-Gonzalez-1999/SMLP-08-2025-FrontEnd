<form (ngSubmit)="guardar()" class="config-form">
  <div class="formgrid grid">
    <div class="field col-12">
      <label for="nombre">Nombre <span class="text-red-500">*</span></label>
      <input 
        id="nombre" 
        type="text" 
        pInputText 
        [(ngModel)]="formData.nombre" 
        name="nombre"
        required
        [disabled]="loading"
        placeholder="Ingrese el nombre del servidor OPC UA" />
    </div>

    <div class="field col-12">
      <label for="descripcion">Descripción</label>
      <textarea 
        id="descripcion" 
        pInputTextarea 
        [(ngModel)]="formData.descripcion" 
        name="descripcion"
        [rows]="3"
        [disabled]="loading"
        placeholder="Ingrese una descripción (opcional)" 
        [autoResize]="false"
        class="descripcion-textarea"></textarea>
    </div>

    <div class="field col-12">
      <label for="direccionUrl">Dirección URL <span class="text-red-500">*</span></label>
      <input 
        id="direccionUrl" 
        type="text" 
        pInputText 
        [(ngModel)]="formData.direccionUrl" 
        name="direccionUrl"
        required
        [disabled]="loading"
        placeholder="Ej: opc.tcp://192.168.1.100:4840" />
    </div>

    <div class="field col-12 md:col-6">
      <label for="usuario">Usuario</label>
      <input 
        id="usuario" 
        type="text" 
        pInputText 
        [(ngModel)]="formData.usuario" 
        name="usuario"
        [disabled]="loading"
        placeholder="Usuario (opcional)" />
    </div>

    <div class="field col-12 md:col-6">
      <label for="contrasena">Contraseña</label>
      <p-password 
        id="contrasena" 
        [(ngModel)]="formData.contrasena" 
        name="contrasena"
        [disabled]="loading"
        [feedback]="false"
        [toggleMask]="true"
        placeholder="Contraseña (opcional)"
        styleClass="w-full"
        [inputStyleClass]="'w-full'"></p-password>
    </div>

    <div class="field col-12">
      <label for="timeoutValueMilisegundos">Timeout (milisegundos)</label>
      <p-inputNumber 
        id="timeoutValueMilisegundos" 
        [(ngModel)]="formData.timeoutValueMilisegundos" 
        name="timeoutValueMilisegundos"
        [min]="0"
        [disabled]="loading"
        placeholder="Timeout en milisegundos (opcional)"
        [showButtons]="false"
        styleClass="w-full"></p-inputNumber>
    </div>

    <div class="field col-12" *ngIf="isEditMode">
      <label for="estaActivo">Estado</label>
      <div class="flex align-items-center gap-2">
        <p-inputSwitch 
          [(ngModel)]="formData.estaActivo" 
          name="estaActivo"
          [disabled]="loading"></p-inputSwitch>
        <span>{{ formData.estaActivo ? 'Activo' : 'Inactivo' }}</span>
      </div>
    </div>
  </div>

  <div class="flex justify-content-end gap-2 mt-4">
    <button 
      pButton 
      pRipple 
      type="button"
      label="Cancelar" 
      icon="pi pi-times" 
      class="p-button-text"
      (click)="cancelar()"
      [disabled]="loading"></button>
    <button 
      pButton 
      pRipple 
      type="submit"
      [label]="isEditMode ? 'Actualizar' : 'Crear'" 
      [icon]="isEditMode ? 'pi pi-check' : 'pi pi-plus'"
      [class]="isEditMode ? 'p-button-warning' : 'p-button-success'"
      [disabled]="loading"
      [loading]="loading"></button>
  </div>
</form>

<p-toast></p-toast>

<form (ngSubmit)="guardar()" class="config-form">
  <div class="formgrid grid">
    <div class="field col-12 md:col-6">
      <label for="idPlc">PLC <span class="text-red-500">*</span></label>
      <p-dropdown 
        id="idPlc" 
        [(ngModel)]="formData.idPlc" 
        name="idPlc"
        [options]="plcsOptions" 
        optionLabel="label" 
        optionValue="value"
        [disabled]="loading"
        placeholder="Seleccione un PLC"
        styleClass="w-full"></p-dropdown>
    </div>

    <div class="field col-12 md:col-6">
      <label for="idLinea">Línea <span class="text-red-500">*</span></label>
      <p-dropdown 
        id="idLinea" 
        [(ngModel)]="formData.idLinea" 
        name="idLinea"
        [options]="lineasOptions" 
        optionLabel="label" 
        optionValue="value"
        [disabled]="loading"
        placeholder="Seleccione una línea"
        styleClass="w-full"></p-dropdown>
    </div>

    <div class="field col-12">
      <label for="idServidorOpcua">Servidor OPC UA <span class="text-red-500">*</span></label>
      <p-dropdown 
        id="idServidorOpcua" 
        [(ngModel)]="formData.idServidorOpcua" 
        name="idServidorOpcua"
        [options]="servidoresOpcuaOptions" 
        optionLabel="label" 
        optionValue="value"
        [disabled]="loading"
        placeholder="Seleccione un servidor OPC UA"
        styleClass="w-full"></p-dropdown>
    </div>

    <div class="field col-12">
      <label for="nodeId">NodeId <span class="text-red-500">*</span></label>
      <input 
        id="nodeId" 
        type="text" 
        pInputText 
        [(ngModel)]="formData.nodeId" 
        name="nodeId"
        required
        [disabled]="loading"
        placeholder="Ej: ns=2;s=Temperature" />
    </div>

    <div class="field col-12">
      <label for="nombre">Nombre <span class="text-red-500">*</span></label>
      <input 
        id="nombre" 
        type="text" 
        pInputText 
        [(ngModel)]="formData.nombre" 
        name="nombre"
        required
        [disabled]="loading"
        placeholder="Ingrese el nombre del tag" />
    </div>

    <div class="field col-12">
      <label for="descripcion">Descripción</label>
      <textarea 
        id="descripcion" 
        pInputTextarea 
        [(ngModel)]="formData.descripcion" 
        name="descripcion"
        [rows]="3"
        [disabled]="loading"
        placeholder="Ingrese una descripción (opcional)" 
        [autoResize]="false"
        class="descripcion-textarea"></textarea>
    </div>

    <div class="field col-12 md:col-6">
      <label for="tipoDato">Tipo de Dato <span class="text-red-500">*</span></label>
      <p-dropdown 
        id="tipoDato" 
        [(ngModel)]="formData.tipoDato" 
        name="tipoDato"
        [options]="tiposDatoOptions" 
        optionLabel="label" 
        optionValue="value"
        [disabled]="loading"
        placeholder="Seleccione un tipo"
        styleClass="w-full"></p-dropdown>
    </div>

    <div class="field col-12 md:col-6">
      <label for="unidadMedida">Unidad de Medida</label>
      <input 
        id="unidadMedida" 
        type="text" 
        pInputText 
        [(ngModel)]="formData.unidadMedida" 
        name="unidadMedida"
        [disabled]="loading"
        placeholder="Ej: °C, bar, etc. (opcional)" />
    </div>

    <div class="field col-12 md:col-6">
      <label for="valorMin">Valor Mínimo</label>
      <p-inputNumber 
        id="valorMin" 
        [(ngModel)]="formData.valorMin" 
        name="valorMin"
        [disabled]="loading"
        placeholder="Valor mínimo (opcional)"
        [showButtons]="false"
        [useGrouping]="false"
        styleClass="w-full"></p-inputNumber>
    </div>

    <div class="field col-12 md:col-6">
      <label for="valorMax">Valor Máximo</label>
      <p-inputNumber 
        id="valorMax" 
        [(ngModel)]="formData.valorMax" 
        name="valorMax"
        [disabled]="loading"
        placeholder="Valor máximo (opcional)"
        [showButtons]="false"
        [useGrouping]="false"
        styleClass="w-full"></p-inputNumber>
    </div>

    <div class="field col-12" *ngIf="isEditMode">
      <label for="estaActivo">Estado</label>
      <div class="flex align-items-center gap-2">
        <p-inputSwitch 
          [(ngModel)]="formData.estaActivo" 
          name="estaActivo"
          [disabled]="loading"></p-inputSwitch>
        <span>{{ formData.estaActivo ? 'Activo' : 'Inactivo' }}</span>
      </div>
    </div>
  </div>

  <div class="flex justify-content-end gap-2 mt-4">
    <button 
      pButton 
      pRipple 
      type="button"
      label="Cancelar" 
      icon="pi pi-times" 
      class="p-button-text"
      (click)="cancelar()"
      [disabled]="loading"></button>
    <button 
      pButton 
      pRipple 
      type="submit"
      [label]="isEditMode ? 'Actualizar' : 'Crear'" 
      [icon]="isEditMode ? 'pi pi-check' : 'pi pi-plus'"
      [class]="isEditMode ? 'p-button-warning' : 'p-button-success'"
      [disabled]="loading"
      [loading]="loading"></button>
  </div>
</form>

<p-toast></p-toast>
